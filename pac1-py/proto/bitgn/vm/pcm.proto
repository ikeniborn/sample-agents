syntax = "proto3";

package bitgn.vm.pcm;

enum Outcome {
  OUTCOME_OK = 0;
  OUTCOME_DENIED_SECURITY = 1;
  OUTCOME_NONE_CLARIFICATION = 2;
  OUTCOME_NONE_UNSUPPORTED = 3;
  OUTCOME_ERR_INTERNAL = 4;
}

service PcmRuntime {
  rpc Tree(TreeRequest) returns (TreeResponse);
  rpc Find(FindRequest) returns (FindResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc MkDir(MkDirRequest) returns (MkDirResponse);
  rpc Move(MoveRequest) returns (MoveResponse);
  rpc Answer(AnswerRequest) returns (AnswerResponse);
}

// Tree: recursive node structure
message TreeNode {
  string name = 1;
  bool is_dir = 2;
  repeated TreeNode children = 3;
}

message TreeRequest {
  string root = 1;
}

message TreeResponse {
  TreeNode root = 1;
}

// Find: flat list of matching paths
message FindRequest {
  string root = 1;
  string name = 2;
  int32 type = 3;
  int32 limit = 4;
}

message FindResponse {
  repeated string items = 1;
}

// Search: matches with path, line number, line text
message SearchRequest {
  string root = 1;
  string pattern = 2;
  int32 limit = 3;
}

message SearchMatch {
  string path = 1;
  int32 line = 2;
  string line_text = 3;
}

message SearchResponse {
  repeated SearchMatch matches = 1;
}

// List: directory entries by name
message ListRequest {
  string name = 1;
}

message ListEntry {
  string name = 1;
  bool is_dir = 2;
}

message ListResponse {
  repeated ListEntry entries = 1;
}

// Read
message ReadRequest {
  string path = 1;
}

message ReadResponse {
  string path = 1;
  string content = 2;
}

// Write
message WriteRequest {
  string path = 1;
  string content = 2;
}

message WriteResponse {}

// Delete
message DeleteRequest {
  string path = 1;
}

message DeleteResponse {}

// MkDir
message MkDirRequest {
  string path = 1;
}

message MkDirResponse {}

// Move
message MoveRequest {
  string from_name = 1;
  string to_name = 2;
}

message MoveResponse {}

// Answer / report_completion
message AnswerRequest {
  string message = 1;
  Outcome outcome = 2;
  repeated string refs = 3;
}

message AnswerResponse {}

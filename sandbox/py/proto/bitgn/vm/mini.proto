syntax = "proto3";

package bitgn.vm;

service MiniRuntime {
  rpc Outline(OutlineRequest) returns (OutlineResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Answer(AnswerRequest) returns (AnswerResponse);
}

message OutlineRequest {
  string path = 1;
}

message FileInfo {
  string path = 1;
  repeated string headers = 2;
}

message OutlineResponse {
  string path = 1;
  repeated FileInfo files = 2;
}

message SearchRequest {
  string path = 1;
  string pattern = 2;
  int32 count = 3;
}

message SearchMatch {
  string path = 1;
  string snippet = 2;
}

message SearchResponse {
  repeated SearchMatch matches = 1;
}

message ListRequest {
  string path = 1;
}

message ListEntry {
  string path = 1;
  bool is_dir = 2;
}

message ListResponse {
  repeated ListEntry entries = 1;
}

message ReadRequest {
  string path = 1;
}

message ReadResponse {
  string path = 1;
  string content = 2;
}

message WriteRequest {
  string path = 1;
  string content = 2;
}

message WriteResponse {}

message DeleteRequest {
  string path = 1;
}

message DeleteResponse {}

message AnswerRequest {
  string answer = 1;
  repeated string refs = 2;
}

message AnswerResponse {}
